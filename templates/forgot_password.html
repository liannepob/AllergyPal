{% extends "layout.html" %}

{% block title %}
   Forgot Password
{% endblock %}

{% block body %}
<div class="container mt-4" style="max-width: 600px;">
    <h2 class="mb-4">Forgot your password? Enter your email here!</h2>
    <form method="POST" class="form-control p-4">
        <input autocomplete="off" class="form-control mb-2" name="email" placeholder="Enter your email" type="text" required>
        <button id="submit" class="btn btn-primary mt-2" type="submit">Submit</button>
    </form>
</div>
{% endblock %}
