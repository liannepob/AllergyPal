{% extends "layout.html" %}

{% block title %}
    Add A Restaurants
{% endblock %}

{% block body %}
<div class="container mt-4" style="max-width: 700px;">
<form method="POST" class="form-control p-4">

    <!-- Restaurant Name -->
        <div class="mb-3">
            <label for="restaurant"><strong>Restaurant Name</strong></label>
            <input
                autocomplete="off"
                class="form-control"
                id="restaurant"
                name="restaurant"
                placeholder="Enter restaurant name"
                type="text"
            >
        </div>

        <!-- Address -->
        <div class="mb-3">
            <label for="address"><strong>Address</strong></label>
            <input
                autocomplete="off"
                class="form-control"
                id="address"
                name="address"
                placeholder="Enter restaurant address"
                type="text"
            >
        </div>

        <!-- Status -->
        <div class="mb-3">
            <label for="status"><strong>Status</strong></label>
            <select name = "status" id="status" required>
                <option value="unsafe">Unsafe</option>
                <option value="safe">Safe</option>
                <option value="unsure">unsure</option>
            </select>
        </div>

        <!-- Notes -->
        <div class="mb-3">
            <label for="notes"><strong>Additional Notes</strong></label>
            <textarea
                class="form-control"
                id="notes"
                name="notes"
                rows="4"
                placeholder="Anything important to know about the restaurant"
            ></textarea>
        </div>

        <button class="btn btn-primary mt-2" type="submit">Add Restaurant</button>
    </form>
{% endblock %}
